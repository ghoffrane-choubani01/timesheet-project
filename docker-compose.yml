services:

  mysql:
    image: mysql:latest
    container_name: mysql-container
    environment:
      MYSQL_ROOT_PASSWORD: Esprit2024
      MYSQL_DATABASE: timesheet
      MYSQL_ROOT_HOST: '%'
    volumes:
      - timesheetvol:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pEsprit2024"]
      interval: 10s
      timeout: 5s
      retries: 5

  timesheet:
    image: timesheet-choubenighofrane-4nids1
    container_name: timesheet-container
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/timesheet?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Esprit2024

volumes:
  timesheetvol:
