services:
  mysql:
    image: mysql:latest
    container_name: timesheet-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: timesheet-devops-db
    ports:
      - "3306:3306"
    volumes:
      - timesheetvol:/var/lib/mysql
    networks:
      - timesheet-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5

  timesheet:
    image: timesheet-ghofranechoubani-4emenidsdevops:latest
    container_name: timesheet-app
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8082:8082"
    restart: on-failure
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://timesheet-mysql:3306/timesheet-devops-db?useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
    networks:
      - timesheet-network

volumes:
  timesheetvol:
    name: timesheetvol

networks:
  timesheet-network:
    driver: bridge
